<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@keyframes vesvir-dot { 0%,60%,100%{ transform: translateY(0); opacity:.35 } 30%{ transform: translateY(-4px); opacity:1 } }
@keyframes vesvir-pop { 0%{ transform: translateY(8px) scale(.96); opacity:0 } 100%{ transform: translateY(0) scale(1); opacity:1 } }
</style>
</helmet>
<div style="display:flex; flex-direction:column; width:100%; height:100%; background:#fff; border-radius:22px; overflow:hidden; box-shadow:0 24px 60px -28px rgba(8,30,18,.45), 0 0 0 1px rgba(8,30,18,.06); font-family:'Hanken Grotesk',sans-serif;">

  <div style="display:flex; align-items:center; gap:11px; padding:13px 16px; background:#075e54; color:#fff;">
    <div style="width:40px; height:40px; border-radius:50%; background:#cdeede; color:#075e54; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; flex-shrink:0;">{{ initials }}</div>
    <div style="display:flex; flex-direction:column; line-height:1.25; min-width:0;">
      <span style="font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ contact }}</span>
      <span style="font-size:12px; color:#a9ddcb; display:flex; align-items:center; gap:5px;">
        <span style="width:7px; height:7px; border-radius:50%; background:#34e07a; display:inline-block;"></span>en línea
      </span>
    </div>
    <div style="margin-left:auto; display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; background:rgba(255,255,255,.14); padding:5px 9px; border-radius:20px;">
      <span style="width:6px; height:6px; border-radius:50%; background:#34e07a; display:inline-block;"></span>Vesvir IA
    </div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; gap:10px; padding:18px 16px; background:#e7ded3; background-image:radial-gradient(rgba(120,150,130,.12) 1px, transparent 1px); background-size:18px 18px; overflow:hidden;">
    <sc-for list="{{ visible }}" as="m" hint-placeholder-count="3">
      <div style="display:flex; flex-direction:column; max-width:82%; align-self:{{ m.align }}; animation:vesvir-pop .32s cubic-bezier(.2,.8,.3,1) both;">
        <sc-if value="{{ m.isCard }}" hint-placeholder-val="{{ false }}">
          <div style="background:#dff6e6; border:1px solid #b6e9c6; border-radius:13px; padding:11px 13px; display:flex; align-items:center; gap:9px; color:#0c6b3a; font-weight:600; font-size:13.5px;">
            <span style="font-size:16px;">{{ m.icon }}</span>{{ m.text }}
          </div>
        </sc-if>
        <sc-if value="{{ m.isBubble }}" hint-placeholder-val="{{ true }}">
          <div style="background:{{ m.bg }}; color:#0c1410; border-radius:14px; padding:8px 12px 6px; font-size:14.5px; line-height:1.4; box-shadow:0 1px 1px rgba(0,0,0,.07); position:relative;">
            <span>{{ m.text }}</span>
            <span style="display:block; text-align:right; font-size:10.5px; color:#5c6b62; margin-top:2px;">{{ m.time }}</span>
          </div>
        </sc-if>
      </div>
    </sc-for>

    <sc-if value="{{ typing }}" hint-placeholder-val="{{ false }}">
      <div style="align-self:{{ typingAlign }}; background:{{ typingBg }}; border-radius:14px; padding:11px 14px; display:flex; gap:5px; box-shadow:0 1px 1px rgba(0,0,0,.07);">
        <span style="width:7px; height:7px; border-radius:50%; background:#7d8c82; animation:vesvir-dot 1.1s infinite;"></span>
        <span style="width:7px; height:7px; border-radius:50%; background:#7d8c82; animation:vesvir-dot 1.1s infinite .18s;"></span>
        <span style="width:7px; height:7px; border-radius:50%; background:#7d8c82; animation:vesvir-dot 1.1s infinite .36s;"></span>
      </div>
    </sc-if>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:560},&quot;messages&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[{&quot;from&quot;:&quot;them&quot;,&quot;text&quot;:&quot;¿Tienen balatas para una Ranger 2018?&quot;,&quot;time&quot;:&quot;10:31&quot;},{&quot;from&quot;:&quot;us&quot;,&quot;text&quot;:&quot;¡Claro! Cerámicas o semimetálicas? 🙌&quot;,&quot;time&quot;:&quot;10:31&quot;}],&quot;tsType&quot;:&quot;{from:'them'|'us',text:string,time?:string,card?:boolean,icon?:string}[]&quot;},&quot;contact&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Refaccionaria El Tornillo&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#d6f7c8&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { shown: 0, typing: false };

  componentDidMount() {
    this._alive = true;
    this._run();
  }
  componentWillUnmount() {
    this._alive = false;
    clearTimeout(this._t);
  }

  _msgs() {
    return (this.props.messages || []);
  }

  _run() {
    const msgs = this._msgs();
    const i = this.state.shown;
    if (!this._alive) return;
    if (i >= msgs.length) {
      // pause then loop
      this._t = setTimeout(() => {
        if (!this._alive) return;
        this.setState({ shown: 0, typing: false });
        this._t = setTimeout(() => this._run(), 350);
      }, 3200);
      return;
    }
    const m = msgs[i];
    const fromUs = m.from === 'us';
    // typing indicator before each message (longer before bot replies for effect = instant feel kept short)
    const typeDelay = fromUs ? 620 : 520;
    const gapBefore = i === 0 ? 250 : 360;
    this._t = setTimeout(() => {
      if (!this._alive) return;
      this.setState({ typing: true });
      this._t = setTimeout(() => {
        if (!this._alive) return;
        this.setState(s => ({ shown: s.shown + 1, typing: false }));
        this._t = setTimeout(() => this._run(), 120);
      }, typeDelay);
    }, gapBefore);
  }

  renderVals() {
    const msgs = this._msgs();
    const shown = this.state.shown;
    const usBg = this.props.accent || '#d6f7c8';
    const visible = msgs.slice(0, shown).map(m => {
      const fromUs = m.from === 'us';
      return {
        align: fromUs ? 'flex-end' : 'flex-start',
        isCard: !!m.card,
        isBubble: !m.card,
        icon: m.icon || '✅',
        bg: fromUs ? usBg : '#ffffff',
        text: m.text,
        time: m.time || ''
      };
    });
    const next = msgs[shown];
    const nextUs = next && next.from === 'us';
    const contact = this.props.contact || 'Cliente';
    const initials = contact.trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
    return {
      visible,
      typing: this.state.typing,
      typingAlign: nextUs ? 'flex-end' : 'flex-start',
      typingBg: nextUs ? usBg : '#ffffff',
      contact,
      initials
    };
  }
}
</script>
</body>
</html>
